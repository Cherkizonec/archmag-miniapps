<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Чат Дальнего Востока</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }
    .box {
      width: 100%;
      max-width: 340px;
      text-align: center;
      padding: 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0 0 18px;
      opacity: 0.9;
    }
    button {
      width: 100%;
      padding: 14px 18px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Чат Дальнего Востока</h1>
    <p>Нажми кнопку ниже, чтобы открыть ресурс</p>
    <button id="go">Открыть</button>
  </div>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    document.getElementById("go").addEventListener("click", function () {
      Telegram.WebApp.openTelegramLink("https://clk.li/MagDV");
    });
  </script>
</body>
</html>
