<!doctype html> 
<html lang="ru"> 
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Резерв Дальнего Востока</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .box {
      width: 100%;
      max-width: 340px;
      text-align: center;
      padding: 24px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      line-height: 1.4;
      opacity: 0.85;
      margin-bottom: 18px;
    }

    button {
      width: 100%;
      padding: 14px 18px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Резерв Дальнего Востока</h1>
    <p>Обязательно подпишись на резерв, чтобы не потерять нас!</p>
    <button id="go">Открыть резерв</button>
  </div>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    document.getElementById("go").addEventListener("click", function () {
      Telegram.WebApp.openTelegramLink("https://t.me/+yr9Kee8V4rk0YWRi");
    });
  </script>
</body>
</html>
